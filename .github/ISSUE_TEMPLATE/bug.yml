name: Bug report
description: Report an incorrect behavior or regression
title: "[Bug]: "
labels: []
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Home Assistant version, browser/device, Home Configurator version.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics and logs
      description: Remove tokens, private URLs and sensitive entity data.
