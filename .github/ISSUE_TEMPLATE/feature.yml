name: Feature request
description: Propose a new capability, interaction, model or platform feature
title: '[Feature]: '
labels: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or architectural problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: architecture
    attributes:
      label: Architecture impact
      description: Identify affected packages, schemas, ADRs or performance constraints.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
