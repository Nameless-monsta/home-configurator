name: Capture final lint after disposal fix

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  diagnostics:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/design-recovery
      - name: Assemble implementation
        run: |
          cat .agent/chunks/shell.* > apps/dashboard/src/phase5/experience-shell.ts
          cat .agent/chunks/css.* > apps/dashboard/src/phase5/iyo-fidelity-v2.css
          python - <<'PY'
          from pathlib import Path
          registry = Path('apps/dashboard/src/phase5/device-model-registry.ts')
          source = registry.read_text()
          start = source.index('const disposeObject =')
          end = source.index('const openUploadDb =')
          block = '''const isMaterialArray = (value: Material | Material[]): value is Material[] =>
            Array.isArray(value);

          const disposeObject = (object: Object3D): void => {
            object.traverse((node) => {
              if (!(node instanceof Mesh)) return;
              const mesh = node;
              mesh.geometry.dispose();
              const material = mesh.material as Material | Material[];
              if (isMaterialArray(material)) {
                for (const entry of material) entry.dispose();
              } else {
                material.dispose();
              }
            });
          };

          '''
          registry.write_text(source[:start] + block + source[end:])
          shell = Path('apps/dashboard/src/phase5/experience-shell.ts')
          source = shell.read_text()
          marker = "const numberValue = (data: FormData, key: string, fallback: number): number => { const value = Number(data.get(key)); return Number.isFinite(value) ? value : fallback; };"
          helpers = """const formString = (data: FormData, key: string, fallback: string): string => { const value = data.get(key); return typeof value === 'string' ? value : fallback; };
          const modelSource = (value: string): DeviceModelSource => { switch (value) { case 'automatic': case 'library': case 'url': case 'upload': case 'procedural': return value; default: return 'automatic'; } };
          const numberValue = (data: FormData, key: string, fallback: number): number => { const value = Number(data.get(key)); return Number.isFinite(value) ? value : fallback; };"""
          if 'const formString =' not in source:
              source = source.replace(marker, helpers)
          shell.write_text(source)
          PY
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm format
      - name: Capture lint
        run: |
          set +e
          pnpm lint > .agent/final-lint-latest.txt 2>&1
          status=$?
          cat .agent/final-lint-latest.txt
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agent/final-lint-latest.txt
          git commit -m "chore: capture latest lint diagnostics"
          git push origin HEAD:agent/design-recovery
          exit $status
