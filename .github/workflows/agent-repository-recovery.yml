name: Diagnose design recovery payload

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/design-recovery
          fetch-depth: 1
      - name: Diagnose payload
        shell: bash
        run: |
          set +e
          {
            cat .agent/design-recovery.part* > /tmp/design-recovery.b64
            wc -c /tmp/design-recovery.b64
            sha256sum /tmp/design-recovery.b64
            base64 --decode /tmp/design-recovery.b64 > /tmp/design-recovery.patch.gz
            echo "base64=$?"
            gzip --test /tmp/design-recovery.patch.gz
            echo "gzip=$?"
            gzip --decompress --stdout /tmp/design-recovery.patch.gz > /tmp/design-recovery.patch
            wc -c /tmp/design-recovery.patch
            sha256sum /tmp/design-recovery.patch
            git apply --check --3way /tmp/design-recovery.patch
            echo "apply=$?"
          } > .agent/apply-diagnostic.txt 2>&1
          cat .agent/apply-diagnostic.txt
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .agent/apply-diagnostic.txt
          git commit -m "chore: capture design recovery diagnostics"
          git push origin HEAD:agent/design-recovery
          exit 1
