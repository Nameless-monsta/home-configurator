name: Apply Configurator Formatting

on:
  push:
    branches:
      - feature/configurator-framework-v0.6.3

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/configurator-framework-v0.6.3
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm format
      - name: Commit generated formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/dashboard/src/main.ts packages/ui/src/configurator-types.ts packages/ui/src/configurator.ts packages/ui/test/configurator-model.test.ts pnpm-lock.yaml
          git commit -m "chore: apply Configurator Framework formatting"
          git push origin HEAD:feature/configurator-framework-v0.6.3
