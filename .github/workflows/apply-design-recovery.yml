name: Apply design recovery import

on:
  push:
    branches:
      - design-recovery-v3
    paths:
      - '.github/recovery/**'
      - '.github/workflows/apply-design-recovery.yml'

permissions:
  contents: write

concurrency:
  group: design-recovery-import
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check import payload
        id: payload
        shell: bash
        run: |
          if [[ ! -f .github/recovery/complete ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Waiting for complete recovery payload."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Apply exact reviewed patch
        if: steps.payload.outputs.ready == 'true'
        shell: bash
        run: |
          cat .github/recovery/part-* > /tmp/design-recovery.patch
          echo '8265b5b9bde4d37c343573e61ab4919de5acf4638bb03b63d61e02a2c898b587  /tmp/design-recovery.patch' | sha256sum --check -
          git apply --check /tmp/design-recovery.patch
          git apply --index /tmp/design-recovery.patch
          rm -rf .github/recovery .github/workflows/apply-design-recovery.yml
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Full design recovery: persistent stage, navigation, Home, Rooms, model fidelity'
          git push origin HEAD:design-recovery-v3
