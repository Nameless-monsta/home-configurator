name: Apply design recovery import

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: design-recovery-import
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'design-recovery-v3'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design-recovery-v3
          fetch-depth: 0

      - name: Check import payload
        shell: bash
        run: test -f .github/recovery/complete

      - name: Normalize uploaded chunk boundaries
        shell: bash
        run: |
          head -c 12000 .github/recovery/part-05 > /tmp/part-05
          head -c 12000 .github/recovery/part-08 > /tmp/part-08
          echo 'f6195513ffb91a672c30ee4dd2b49360ea2d12366aae46491b7916df51b2808f  /tmp/part-05' | sha256sum --check -
          echo '9f86fc281c84770e20ba0beca980d8e6996e2aab5012abc901879e9a89d5e9a2  /tmp/part-08' | sha256sum --check -

      - name: Assemble and verify recovery patch
        shell: bash
        run: |
          {
            cat .github/recovery/part-00 .github/recovery/part-01 .github/recovery/part-02 .github/recovery/part-03 .github/recovery/part-04
            cat /tmp/part-05
            cat .github/recovery/part-06 .github/recovery/part-07
            cat /tmp/part-08
            cat .github/recovery/part-09 .github/recovery/part-10 .github/recovery/part-11
          } > /tmp/design-recovery.patch
          echo '8265b5b9bde4d37c343573e61ab4919de5acf4638bb03b63d61e02a2c898b587  /tmp/design-recovery.patch' | sha256sum --check -
          test "$(wc -c < /tmp/design-recovery.patch)" -eq 136355

      - name: Validate recovery patch
        shell: bash
        run: git apply --check /tmp/design-recovery.patch

      - name: Apply and publish recovery
        shell: bash
        run: |
          git apply --index /tmp/design-recovery.patch
          rm -rf .github/recovery .github/workflows/apply-design-recovery.yml
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Full design recovery: persistent stage, navigation, Home, Rooms, model fidelity'
          git push origin HEAD:design-recovery-v3
