name: Apply design recovery import

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: design-recovery-import
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'design-recovery-v3'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design-recovery-v3
          fetch-depth: 0

      - name: Check import payload
        shell: bash
        run: test -f .github/recovery/complete

      - name: Record payload diagnostics
        shell: bash
        run: |
          sha256sum .github/recovery/part-* > .github/recovery/actual-sha.txt
          wc -c .github/recovery/part-* >> .github/recovery/actual-sha.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/recovery/actual-sha.txt
          if ! git diff --cached --quiet; then
            git commit -m 'Record recovery payload diagnostics'
            git push origin HEAD:design-recovery-v3
          fi

      - name: Assemble recovery patch
        shell: bash
        run: |
          cat .github/recovery/part-* > /tmp/design-recovery.patch
          wc -c /tmp/design-recovery.patch
          sha256sum /tmp/design-recovery.patch

      - name: Verify recovery checksum
        shell: bash
        run: echo '8265b5b9bde4d37c343573e61ab4919de5acf4638bb03b63d61e02a2c898b587  /tmp/design-recovery.patch' | sha256sum --check -

      - name: Validate recovery patch
        shell: bash
        run: git apply --check /tmp/design-recovery.patch

      - name: Apply and publish recovery
        shell: bash
        run: |
          git apply --index /tmp/design-recovery.patch
          rm -rf .github/recovery .github/workflows/apply-design-recovery.yml
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Full design recovery: persistent stage, navigation, Home, Rooms, model fidelity'
          git push origin HEAD:design-recovery-v3
