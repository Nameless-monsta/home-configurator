name: Apply Motion Wiring

on:
  push:
    branches:
      - feature/iyo-motion-v0.6.6

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/iyo-motion-v0.6.6
      - name: Wire motion system
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/dashboard/src/main.ts')
          text = path.read_text()
          text = text.replace(
              "  UiFoundation,\n  UiNavigation,",
              "  UiFoundation,\n  UiMotionOrchestrator,\n  UiNavigation,",
          )
          text = text.replace(
              "import './configurator.css';",
              "import './configurator.css';\nimport './motion.css';",
          )
          text = text.replace("  version: '0.6.5',", "  version: '0.6.6',")
          text = text.replace(
              "const navigation = new UiNavigation({\n  root,\n  onNavigate: (location) => configurator.setDocument(createDocument(latestHomeSnapshot, location)),\n});",
              "const navigation = new UiNavigation({\n  root,\n  onNavigate: (location) => configurator.setDocument(createDocument(latestHomeSnapshot, location)),\n});\n\nconst motion = new UiMotionOrchestrator({\n  root,\n  reducedMotion: () => window.matchMedia('(prefers-reduced-motion: reduce)').matches,\n});",
          )
          text = text.replace(
              "  configurator.dispose();\n  navigation.dispose();",
              "  motion.dispose();\n  configurator.dispose();\n  navigation.dispose();",
          )
          path.write_text(text)
          PY
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm prettier --write apps/dashboard/src/main.ts apps/dashboard/src/motion.css packages/ui/src/motion.ts packages/ui/src/motion-orchestrator.ts packages/ui/test/motion.test.ts
      - name: Commit wiring
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/dashboard/src/main.ts apps/dashboard/src/motion.css packages/ui/src/motion.ts packages/ui/src/motion-orchestrator.ts packages/ui/test/motion.test.ts
          git commit -m "feat(ui): wire iyO motion system"
          git push origin HEAD:feature/iyo-motion-v0.6.6
