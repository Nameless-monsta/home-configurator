name: Apply Responsive Wiring

on:
  push:
    branches:
      - feature/responsive-behaviour-v0.6.7

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/responsive-behaviour-v0.6.7
      - name: Wire responsive stylesheet and version
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/dashboard/src/main.ts')
          text = path.read_text()
          text = text.replace("import './motion.css';", "import './motion.css';\nimport './responsive.css';")
          text = text.replace("version: '0.6.6'", "version: '0.6.7'")
          path.write_text(text)
          PY
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm prettier --write apps/dashboard/src/main.ts
      - name: Commit wiring
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/dashboard/src/main.ts
          git commit -m "feat(dashboard): enable responsive behaviour"
          git push origin HEAD:feature/responsive-behaviour-v0.6.7
