name: Apply UI Validation Version

on:
  push:
    branches:
      - feature/ui-validation-v0.6.8

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/ui-validation-v0.6.8
      - name: Update dashboard version
        run: sed -i "s/version: '0.6.7'/version: '0.6.8'/" apps/dashboard/src/main.ts
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm prettier --write apps/dashboard/src/main.ts
      - name: Commit version
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/dashboard/src/main.ts
          git commit -m "chore(dashboard): display version 0.6.8"
          git push origin HEAD:feature/ui-validation-v0.6.8
