name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.head_ref != 'automation/import-spatial-experience-shell'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test:ci

      - name: Build
        run: pnpm build

  import-spatial-experience-shell:
    if: github.event_name == 'pull_request' && github.head_ref == 'automation/import-spatial-experience-shell'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out importer branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          show-progress: false

      - name: Reconstruct and verify bundle
        shell: bash
        run: |
          set -euo pipefail
          git fetch --quiet --depth=1 origin 2556a36964c33209862db4e6f05f3da22d7828c5
          cat .github/import-payload/parts/part-*.b64 > /tmp/spatial-experience-shell.bundle.b64
          test "$(wc -c < /tmp/spatial-experience-shell.bundle.b64)" -eq 15512
          base64 --decode /tmp/spatial-experience-shell.bundle.b64 > /tmp/spatial-experience-shell.bundle
          echo "93a76dbd128bb558cd20521c7038d5321b517470555bd0a158b6e97ab5719db2  /tmp/spatial-experience-shell.bundle" | sha256sum --check -
          git bundle verify /tmp/spatial-experience-shell.bundle

      - name: Confirm preserved feature branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch /tmp/spatial-experience-shell.bundle \
            'feature/spatial-experience-shell:refs/heads/feature/spatial-experience-shell'
          git push origin \
            'refs/heads/feature/spatial-experience-shell:refs/heads/feature/spatial-experience-shell'

      - name: Remove temporary importer branch
        shell: bash
        run: git push origin --delete automation/import-spatial-experience-shell
