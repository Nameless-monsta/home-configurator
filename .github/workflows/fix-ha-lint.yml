name: Apply Home Assistant Lint Corrections

on:
  push:
    branches:
      - feature/home-assistant-engine-v0.5.0

permissions:
  contents: write

jobs:
  fix:
    if: github.event.head_commit.message != 'chore: apply Home Assistant lint corrections'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/home-assistant-engine-v0.5.0
      - name: Apply exact lint corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              'packages/home-assistant/src/home-assistant-engine.ts': [
                  ("type: String(message['type'] ?? 'unknown'),", "type: typeof message['type'] === 'string' ? message['type'] : 'unknown',"),
              ],
              'packages/home-assistant/src/memory-transport.ts': [
                  ("domain: String(message['domain'] ?? ''),", "domain: typeof message['domain'] === 'string' ? message['domain'] : '',"),
                  ("service: String(message['service'] ?? ''),", "service: typeof message['service'] === 'string' ? message['service'] : '',"),
                  ("listener(event as HAEvent<unknown>);", "listener(event);"),
              ],
              'packages/home-assistant/src/websocket-client.ts': [
                  ("return typeof parsed === 'object' && parsed !== null ? (parsed as IncomingMessage) : undefined;", "return typeof parsed === 'object' && parsed !== null ? parsed : undefined;"),
                  ("public async disconnect(): Promise<void> {", "public disconnect(): Promise<void> {"),
                  ("    this.#subscriptions.clear();\n  }\n\n  public request<T>", "    this.#subscriptions.clear();\n    return Promise.resolve();\n  }\n\n  public request<T>"),
              ],
          }

          for filename, changes in replacements.items():
              path = Path(filename)
              text = path.read_text()
              for old, new in changes:
                  if old not in text:
                      raise SystemExit(f'Missing expected text in {filename}: {old}')
                  text = text.replace(old, new, 1)
              path.write_text(text)
          PY
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/home-assistant
          git commit -m "chore: apply Home Assistant lint corrections"
          git push origin HEAD:feature/home-assistant-engine-v0.5.0
