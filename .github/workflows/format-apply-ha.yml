name: Apply Home Assistant Formatting

on:
  push:
    branches:
      - feature/home-assistant-engine-v0.5.0

permissions:
  contents: write

jobs:
  format:
    if: github.event.head_commit.message != 'chore: apply formatting'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/home-assistant-engine-v0.5.0
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm format
      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: apply formatting"
          git push origin HEAD:feature/home-assistant-engine-v0.5.0
