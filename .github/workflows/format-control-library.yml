name: Apply Control Library Formatting

on:
  push:
    branches:
      - feature/control-library-v0.6.4

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/control-library-v0.6.4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm prettier --write apps/dashboard/src/configurator.css packages/ui/src/configurator-types.ts packages/ui/src/control-library.ts packages/ui/test/control-library.test.ts
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/dashboard/src/configurator.css packages/ui/src/configurator-types.ts packages/ui/src/control-library.ts packages/ui/test/control-library.test.ts
          git commit -m "chore: format Control Library"
          git push origin HEAD:feature/control-library-v0.6.4
