name: Apply Device Panels Formatting

on:
  push:
    branches:
      - feature/device-panels-v0.6.5

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/device-panels-v0.6.5
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm prettier --write apps/dashboard/src/device-panel-adapter.ts apps/dashboard/src/main.ts packages/ui/src/device-panels.ts packages/ui/test/device-panels.test.ts
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/dashboard/src/device-panel-adapter.ts apps/dashboard/src/main.ts packages/ui/src/device-panels.ts packages/ui/test/device-panels.test.ts
          git commit -m "chore: format Device Panels"
          git push origin HEAD:feature/device-panels-v0.6.5
