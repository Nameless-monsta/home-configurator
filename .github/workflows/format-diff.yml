name: Format Diff

on:
  pull_request:

permissions:
  contents: read

jobs:
  format-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Generate formatting patch
        run: |
          pnpm format
          git diff --binary > format.patch
          test ! -s format.patch || true
      - uses: actions/upload-artifact@v4
        with:
          name: format-patch
          path: format.patch
