name: Package Phase 5 repository

on:
  push:
    branches:
      - phase-5-iyo-experience
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create source archive
        run: |
          zip -r home-configurator-phase-5-iyo.zip . \
            -x '.git/*' \
            -x 'node_modules/*' \
            -x '.turbo/*' \
            -x 'dist/*' \
            -x 'coverage/*'
      - name: Upload repository archive
        uses: actions/upload-artifact@v4
        with:
          name: home-configurator-phase-5-iyo
          path: home-configurator-phase-5-iyo.zip
          if-no-files-found: error
          retention-days: 7
