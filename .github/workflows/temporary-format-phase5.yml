name: Temporary Format Phase 5

on:
  push:
    branches: [main]
    paths: [.github/workflows/temporary-format-phase5.yml]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-5-complete
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - name: Commit formatting
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Format complete Phase 5 implementation'
          git push origin HEAD:phase-5-complete
